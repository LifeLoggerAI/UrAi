<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">URAI Public Demo</title>
  <desc id="desc">URAI public demo social preview for a privacy-gated symbolic Life Map.</desc>
  <defs>
    <radialGradient id="sky" cx="28%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#155e75"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="35%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <circle cx="930" cy="155" r="240" fill="#22d3ee" opacity="0.12"/>
  <circle cx="180" cy="520" r="260" fill="#2dd4bf" opacity="0.10"/>
  <circle cx="910" cy="315" r="86" fill="url(#orb)" opacity="0.96"/>
  <circle cx="910" cy="315" r="128" fill="none" stroke="#cffafe" stroke-width="3" opacity="0.42"/>
  <g fill="#e0f2fe" opacity="0.65">
    <circle cx="160" cy="120" r="3"/>
    <circle cx="240" cy="210" r="2"/>
    <circle cx="365" cy="128" r="2.5"/>
    <circle cx="760" cy="100" r="2"/>
    <circle cx="1030" cy="470" r="2.4"/>
    <circle cx="705" cy="438" r="3"/>
  </g>
  <text x="96" y="150" fill="#67e8f9" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="9">URAI PUBLIC DEMO</text>
  <text x="96" y="275" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700">A symbolic Life Map,</text>
  <text x="96" y="365" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700">gated before it</text>
  <text x="96" y="455" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700">becomes personal.</text>
  <text x="100" y="532" fill="#bae6fd" font-family="Verdana, Arial, sans-serif" font-size="25">Privacy-gated reflection. Sample data only. Roadmap systems clearly labeled.</text>
</svg>
