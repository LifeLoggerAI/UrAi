<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AR VR XR worlds placeholder</title><desc id="desc">Preview portals for AR, VR, and XR memory worlds.</desc>
  <rect width="1600" height="1000" fill="#020617"/>
  <g fill="#0f172a" stroke="#7dd3fc" stroke-opacity=".35"><rect x="170" y="270" width="340" height="390" rx="48"/><rect x="630" y="220" width="340" height="470" rx="48"/><rect x="1090" y="270" width="340" height="390" rx="48"/></g>
  <g fill="#eff6ff" font-family="Arial, sans-serif" font-size="72" font-weight="700" text-anchor="middle"><text x="340" y="500">AR</text><text x="800" y="500">VR</text><text x="1260" y="500">XR</text></g>
  <text x="800" y="820" fill="#fef3c7" font-family="Arial, sans-serif" font-size="34" text-anchor="middle">Preview surfaces. Worlds remain gated until proven.</text>
</svg>
