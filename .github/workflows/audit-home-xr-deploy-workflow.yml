name: Audit Home XR Deploy Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-home-xr-deploy-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-home-xr-deploy-workflow:
    name: Audit Home XR deploy workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Home XR deploy workflow
        run: node scripts/check-home-xr-deploy-workflow.mjs
