name: Legacy URAI Firebase Deploy — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny-legacy-production:
    name: Deny legacy Firebase deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Record canonical authority and fail closed
        shell: bash
        run: |
          cat <<'EOF'
          This legacy workflow is intentionally quarantined.

          LifeLoggerAI/UrAi must not authenticate a Firebase service account or
          execute the legacy ship:urai production command.

          Canonical production authority:
            LifeLoggerAI/urai-spatial
            application: urai-tier1
            branch: main
            domain: urai.app

          Use the protected release workflow in urai-spatial.
          No secrets are read and no infrastructure mutation is attempted here.
          EOF
          exit 1
