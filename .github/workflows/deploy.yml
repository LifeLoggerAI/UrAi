name: Legacy UrAi Firebase Deploy (Manual Override Only)

on:
  workflow_dispatch:
    inputs:
      legacy_override:
        description: Type DEPLOY_LEGACY_URAI to acknowledge this repository shares the canonical production target
        required: true
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: legacy-urai-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ inputs.legacy_override == 'DEPLOY_LEGACY_URAI' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Display legacy-target warning
        run: |
          echo "::warning::This legacy repository targets Firebase project/site urai-4dc1d, which is also used by the canonical urai-spatial application."
          echo "::warning::Do not continue unless an intentional rollback or migration has been approved."

      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies reproducibly
        run: npm ci

      - name: Verify release gates
        run: |
          npm run check:ar-preview
          npm run verify:routes
          npm run verify:assets
          npm run check:public-copy
          npm run check:production-claims

      - name: Build
        run: npm run build

      - name: Deploy legacy app to shared Firebase Hosting live target
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URAI }}
          projectId: urai-4dc1d
          channelId: live

      - name: Verify live Genesis routes and AR asset
        env:
          BASE_URL: https://urai-4dc1d.web.app
        run: |
          set -euo pipefail
          routes=("/" "/home" "/xr" "/assets/ar/urai-genesis-orb.gltf" "/u/adamclamp" "/api/status")
          for route in "${routes[@]}"; do
            url="${BASE_URL}${route}"
            status=$(curl -L -s -o /tmp/urai-route-body -w "%{http_code}" "$url")
            echo "$status $url"
            test "$status" = "200"
          done

      - name: Verify custom-domain linked route parity
        env:
          URAI_LIVE_BASE_URL: https://urai.app
        run: npm run smoke:linked-routes:live

      - name: Verify live Genesis XR AR contract
        env:
          URAI_LIVE_BASE_URL: https://urai-4dc1d.web.app
        run: npm run smoke:genesis-xr-ar-live
