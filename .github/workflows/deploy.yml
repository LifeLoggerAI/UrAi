name: Deploy (Firebase Hosting)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/deploy-urai-firebase.sh"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy production Firebase hosting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      npm_config_cache: /tmp/urai-npm-cache
      NEXT_DISABLE_CACHE: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare writable npm cache
        run: mkdir -p "$npm_config_cache"

      - run: npm ci

      - name: Run production build
        run: npm run build

      - name: Deploy production hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: urai-4dc1d
          target: urai-4dc1d
