name: Deploy (Firebase Production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/deploy-urai-firebase.sh"
      - ".github/workflows/deploy.yml"

concurrency:
  group: firebase-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      npm_config_cache: /tmp/urai-npm-cache
      NEXT_DISABLE_CACHE: "1"
      NPM_CONFIG_CACHE: /tmp/urai-npm-cache

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare writable tool caches
        run: |
          mkdir -p "$npm_config_cache"
          npm config set cache "$npm_config_cache" --global
          npm config get cache

      - name: Install dependencies
        run: npm ci

      - name: Validate production Firebase target
        env:
          URAI_EXPECTED_FIREBASE_PROJECT: urai-4dc1d
          URAI_EXPECTED_FIREBASE_SITE: urai-4dc1d
        run: node scripts/check-firebase-target.mjs --config firebase.json

      - name: Run production build
        run: npm run build

      - name: Deploy production hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          npm_config_cache: /tmp/urai-npm-cache
          NPM_CONFIG_CACHE: /tmp/urai-npm-cache
          NEXT_DISABLE_CACHE: "1"
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: urai-4dc1d
          target: urai-4dc1d
