name: Deploy (Firebase Production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/deploy-urai-firebase.sh"
      - ".github/workflows/deploy.yml"

concurrency:
  group: firebase-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      npm_config_cache: /tmp/urai-npm-cache
      NEXT_DISABLE_CACHE: "1"
      URAI_DEPLOY_ENV: production
      URAI_PRODUCTION_DEPLOY_APPROVED: "1"
      URAI_DEPLOY_RUN_CHECKS: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare writable tool caches
        run: |
          mkdir -p "$npm_config_cache"
          npm config set cache "$npm_config_cache" --global
          npm config get cache

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install --no-save firebase-tools

      - name: Write Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is required"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy rules, indexes, and hosting
        run: npm run ship:urai:prod
