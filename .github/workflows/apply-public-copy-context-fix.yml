name: Apply Public Copy Context Fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-public-copy-context-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/quarantine-legacy-production-authority-20260715
          fetch-depth: 0
          persist-credentials: true
      - name: Apply exact anchors
        shell: python
        run: |
          from pathlib import Path
          p = Path('scripts/check-public-copy.mjs')
          s = p.read_text()
          s = s.replace('''    allowedNearby: immersiveBoundary,\n    reason: "immersive claim must be future-only, capability-gated, support-gated, or fallback-qualified in V1",''','''    allowedNearby: immersiveBoundary,\n    allowInternalDocumentBoundary: true,\n    reason: "immersive claim must be future-only, capability-gated, support-gated, or fallback-qualified in V1",''',1)
          s = s.replace('''    allowedNearby: immersiveBoundary,\n    reason: "Spatial launch/readiness claims must remain qualified in this legacy repository",''','''    allowedNearby: immersiveBoundary,\n    allowInternalDocumentBoundary: true,\n    reason: "Spatial launch/readiness claims must remain qualified in this legacy repository",''',1)
          s = s.replace('''  const lines = fs.readFileSync(filePath, "utf8").split(/\\r?\\n/);\n  lines.forEach((line, index) => {''','''  const fullContent = fs.readFileSync(filePath, "utf8");\n  const lines = fullContent.split(/\\r?\\n/);\n  const isInternalDocument = relativePath.startsWith("docs/");\n  lines.forEach((line, index) => {''',1)
          s = s.replace('''      if (claim.allowedNearby.test(context)) continue;\n      console.error(`public-copy: risky V1 claim in ${relativePath}:${index + 1}`);''','''      if (claim.allowedNearby.test(context)) continue;\n      if (isInternalDocument && claim.allowInternalDocumentBoundary && claim.allowedNearby.test(fullContent)) continue;\n      console.error(`public-copy: risky V1 claim in ${relativePath}:${index + 1}`);''',1)
          if s.count('allowInternalDocumentBoundary: true') != 2:
              raise SystemExit('expected two immersive document-boundary markers')
          if 'const isInternalDocument = relativePath.startsWith("docs/");' not in s:
              raise SystemExit('internal document marker missing')
          p.write_text(s)
          Path('.github/workflows/apply-public-copy-context-fix.yml').unlink()
      - name: Verify and commit permanent source
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/check-public-copy.mjs
          test ! -e .github/workflows/apply-public-copy-context-fix.yml
          git diff --check
          git config user.name LifeLoggerAI
          git config user.email actions@users.noreply.github.com
          git add -A
          git commit -m "fix: honor immersive boundaries in internal docs"
          git push origin HEAD:chore/quarantine-legacy-production-authority-20260715
