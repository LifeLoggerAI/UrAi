name: Governed Asset Promotion

on:
  pull_request:
    branches: [main]
    paths:
      - 'public/assets/generated/**'
      - 'public/assets/generated-manifests/**'
      - 'public/assets/generated-validation/**'

permissions:
  contents: read

concurrency:
  group: governed-asset-promotion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governed-asset-promotion:
    name: Governed asset promotion gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: 'true'
      URAI_PROMOTION_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:ci'
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
      URAI_REQUIRE_FIREBASE_ADMIN: '0'
      URAI_ENABLE_CHRONO_FIRESTORE: '0'
      OPENAI_API_KEY: ci-placeholder-openai-key
    steps:
      - name: Check out promotion candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate governed promotion evidence
        run: node scripts/check-governed-asset-promotion.mjs

      - name: Install dependencies
        run: npm ci

      - name: Genesis contract checks
        run: |
          npm run check:genesis
          npm run check:genesis:assets
          npm run check:genesis:audio

      - name: Asset import checks
        run: npm run verify:assets

      - name: Typecheck and lint
        run: |
          npm run check:types
          npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Production build
        run: npm run build

      - name: Runtime smoke
        run: npm run smoke:genesis-spine
