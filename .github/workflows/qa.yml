name: URAI QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      CI: true
      URAI_WAITLIST_DRY_RUN: "1"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
      FIREBASE_PROJECT_ID: ""
      OPENAI_API_KEY: ""
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify legacy production authority boundary
        shell: bash
        run: |
          set -euo pipefail
          test ! -f .github/workflows/deploy.yml
          test ! -f .github/workflows/firebase-hosting-live.yml
          test -f docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md
          grep -Fq 'LifeLoggerAI/urai-spatial' docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md
          grep -Fq 'sole production authority' docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Legacy E2E regression audit
        continue-on-error: true
        run: npm run test:e2e
