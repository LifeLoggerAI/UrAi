name: Legacy Post Deploy Verification — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-24.04
    steps:
      - name: Deny legacy post-deploy authority
        run: |
          echo "This legacy repository cannot verify or certify a canonical deployment." >&2
          echo "Use the canonical urai-spatial protected release process." >&2
          exit 1
