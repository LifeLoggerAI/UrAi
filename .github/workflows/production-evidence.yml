name: Legacy Production Evidence — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-24.04
    steps:
      - name: Deny legacy production evidence authority
        run: |
          echo "This legacy repository cannot generate current production evidence." >&2
          echo "Use the canonical urai-spatial protected release evidence." >&2
          exit 1
