name: URAI Launch Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  launch-gate:
    name: Preflight, tier lock, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci-placeholder"
      NEXT_PUBLIC_URAI_NARRATOR_FALLBACK: speech
      URAI_ENABLE_CHRONO_FIRESTORE: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium with OS dependencies
        run: npx playwright install --with-deps chromium

      - name: Run preflight
        run: npm run preflight

      - name: Run URAI tier lock
        run: npm run urai:tier5

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
