name: Read-Only LFS Cleanliness Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/read-only-lfs-cleanliness-diagnostic.yml
      - .gitattributes

permissions:
  contents: read

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha }}
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact candidate without LFS smudge
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
          lfs: false

      - name: Capture path-only cleanliness evidence
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/lfs-cleanliness"
          mkdir -p "$evidence"
          printf 'expected=%s\nactual=%s\n' "$TARGET_SHA" "$(git rev-parse HEAD)" > "$evidence/head.env"
          git status --porcelain=v2 --untracked-files=all > "$evidence/status-porcelain-v2.txt"
          git diff --name-status > "$evidence/diff-name-status.txt"
          git diff --numstat > "$evidence/diff-numstat.txt"
          git lfs ls-files --name-only > "$evidence/lfs-files.txt" 2>&1 || true
          git ls-files public/assets > "$evidence/tracked-public-assets.txt"
          git check-attr filter diff merge text -- $(git ls-files public/assets) > "$evidence/public-assets-attributes.txt" 2>&1 || true
          cp .gitattributes "$evidence/gitattributes.txt"
          {
            echo "credentialed=false"
            echo "deployment=false"
            echo "file_contents_captured=false"
          } > "$evidence/authority.env"

      - name: Upload path-only diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-lfs-cleanliness-${{ env.TARGET_SHA }}
          path: ${{ runner.temp }}/lfs-cleanliness
          if-no-files-found: error
          retention-days: 30
