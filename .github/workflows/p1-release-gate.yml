name: Legacy P1 Release Gate — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-24.04
    steps:
      - name: Deny legacy release authority
        run: |
          echo "This legacy repository cannot approve or certify a production release." >&2
          echo "Use the canonical urai-spatial release process." >&2
          exit 1
