name: URAI Vault CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - feat/urai-vault-data-wallet

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # package-lock.json is currently stale against package.json; use npm install
        # until docs/LOCKFILE_REFRESH.md is completed and workflows can return to npm ci.
        run: npm install

      - name: Typecheck
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
