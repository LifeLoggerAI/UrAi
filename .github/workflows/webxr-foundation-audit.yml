name: Legacy WebXR Source Audit

on:
  workflow_dispatch:
  push:
    paths:
      - "src/components/xr/**"
      - "src/app/xr/**"
      - "src/components/urai/home/**"
      - "tests/e2e/home-xr-interaction.spec.ts"
      - "src/components/xr/__tests__/**"
      - "scripts/check-webxr-foundation-release-readiness.mjs"
      - "scripts/check-home-xr-deploy-workflow.mjs"
      - "scripts/check-home-xr-launch-evidence-consistency.mjs"
      - "scripts/check-public-copy.mjs"
      - "scripts/check-production-claims.mjs"
      - ".github/workflows/webxr-foundation-audit.yml"
      - ".github/workflows/deploy-home-xr.yml"
  pull_request:
    paths:
      - "src/components/xr/**"
      - "src/app/xr/**"
      - "src/components/urai/home/**"
      - "tests/e2e/home-xr-interaction.spec.ts"
      - "src/components/xr/__tests__/**"
      - "scripts/check-webxr-foundation-release-readiness.mjs"
      - "scripts/check-home-xr-deploy-workflow.mjs"
      - "scripts/check-home-xr-launch-evidence-consistency.mjs"
      - "scripts/check-public-copy.mjs"
      - "scripts/check-production-claims.mjs"
      - ".github/workflows/webxr-foundation-audit.yml"
      - ".github/workflows/deploy-home-xr.yml"

permissions:
  contents: read

concurrency:
  group: legacy-webxr-source-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  GIT_LFS_SKIP_SMUDGE: "1"
  CI: "true"
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "legacy-reference-ci.invalid"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "legacy-reference-ci"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "legacy-reference-ci.invalid"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:legacy-reference"
  FIREBASE_PROJECT_ID: "legacy-reference-ci"
  FIREBASE_CLIENT_EMAIL: "ci@example.invalid"
  FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
  URAI_REQUIRE_FIREBASE_ADMIN: "0"
  URAI_ENABLE_CHRONO_FIRESTORE: "0"

jobs:
  source-audit:
    name: Verify legacy WebXR source without deploy claims
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
          lfs: false

      - name: Prove exact clean head
        shell: bash
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          commit_tree="$(git rev-parse 'HEAD^{tree}')"
          index_tree="$(git write-tree)"
          untracked="$(git ls-files --others --exclude-standard)"
          non_lfs_changes="$(git diff --name-only -- . ':(exclude)public/assets/**')"
          printf 'expected_head=%s\nactual_head=%s\ncommit_tree=%s\nindex_tree=%s\n' \
            "$TARGET_SHA" "$actual_head" "$commit_tree" "$index_tree"
          if [[ -n "$untracked" ]]; then printf 'untracked_paths:\n%s\n' "$untracked"; fi
          if [[ -n "$non_lfs_changes" ]]; then printf 'non_lfs_changes:\n%s\n' "$non_lfs_changes"; fi
          test "$actual_head" = "$TARGET_SHA"
          test "$index_tree" = "$commit_tree"
          test -z "$untracked"
          test -z "$non_lfs_changes"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install frozen dependencies
        run: npm ci

      - name: Capture WebXR source readiness contract
        id: readiness
        shell: bash
        run: |
          set -uo pipefail
          evidence="$RUNNER_TEMP/webxr-source-readiness"
          mkdir -p "$evidence"
          set +e
          node scripts/check-webxr-foundation-release-readiness.mjs 2>&1 | tee "$evidence/readiness.log"
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > "$evidence/readiness.exit"
          {
            echo "head_sha=$TARGET_SHA"
            echo "credentialed=false"
            echo "deployment=false"
            echo "browser_certification=false"
            echo "production_data_mutation=false"
          } > "$evidence/authority.env"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Upload WebXR source readiness evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-webxr-source-readiness-${{ env.TARGET_SHA }}
          path: ${{ runner.temp }}/webxr-source-readiness
          if-no-files-found: error
          retention-days: 30

      - name: Enforce WebXR source readiness result
        run: test "${{ steps.readiness.outputs.exit_code }}" = "0"

      - name: Verify Home XR deployment quarantine
        run: node scripts/check-home-xr-deploy-workflow.mjs

      - name: Verify Home XR evidence quarantine
        run: node scripts/check-home-xr-launch-evidence-consistency.mjs

      - name: Verify TypeScript and lint
        run: |
          npm run check:types
          npm run lint

      - name: Verify focused XR unit contract
        run: npm test -- --runInBand src/components/xr/__tests__/XRSessionFoundation.test.tsx

      - name: Build source candidate
        run: npm run build

      - name: Verify routes
        run: npm run verify:routes

      - name: Verify assets
        run: npm run verify:assets

      - name: Capture copy and production-claim policy evidence
        id: policy
        shell: bash
        run: |
          set -uo pipefail
          evidence="$RUNNER_TEMP/webxr-policy-audit"
          mkdir -p "$evidence"

          set +e
          npm run check:public-copy 2>&1 | tee "$evidence/public-copy.log"
          public_copy_status=${PIPESTATUS[0]}
          npm run check:production-claims 2>&1 | tee "$evidence/production-claims.log"
          production_claims_status=${PIPESTATUS[0]}
          set -e

          printf '%s\n' "$public_copy_status" > "$evidence/public-copy.exit"
          printf '%s\n' "$production_claims_status" > "$evidence/production-claims.exit"
          {
            echo "head_sha=$TARGET_SHA"
            echo "credentialed=false"
            echo "deployment=false"
            echo "browser_certification=false"
            echo "production_data_mutation=false"
          } > "$evidence/authority.env"

          echo "public_copy_exit=$public_copy_status" >> "$GITHUB_OUTPUT"
          echo "production_claims_exit=$production_claims_status" >> "$GITHUB_OUTPUT"

      - name: Upload copy and production-claim policy evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-webxr-policy-audit-${{ env.TARGET_SHA }}
          path: ${{ runner.temp }}/webxr-policy-audit
          if-no-files-found: error
          retention-days: 30

      - name: Verify public-copy policy
        run: test "${{ steps.policy.outputs.public_copy_exit }}" = "0"

      - name: Verify production-claims policy
        run: test "${{ steps.policy.outputs.production_claims_exit }}" = "0"

      - name: Verify Home XR lock and historical proof manifest
        run: |
          node scripts/check-home-xr-lock.mjs
          node scripts/check-home-xr-proof-manifest.mjs
          npm run smoke:genesis-spine

      - name: Confirm browser evidence remains canonical-only
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'test.describe.skip("archived home XR assertions"' tests/e2e/home-xr-interaction.spec.ts
          grep -Fq 'outside current release smoke' tests/e2e/home-xr-interaction.spec.ts
          grep -Fq 'LifeLoggerAI/urai-spatial' system/canonical-authority.json
