name: Legacy WebXR Source Audit

on:
  workflow_dispatch:
  push:
    paths:
      - "src/components/xr/**"
      - "src/app/xr/**"
      - "src/components/urai/home/**"
      - "tests/e2e/home-xr-interaction.spec.ts"
      - "src/components/xr/__tests__/**"
      - "scripts/check-webxr-foundation-release-readiness.mjs"
      - "scripts/check-home-xr-deploy-workflow.mjs"
      - "scripts/check-home-xr-launch-evidence-consistency.mjs"
      - ".github/workflows/webxr-foundation-audit.yml"
      - ".github/workflows/deploy-home-xr.yml"
  pull_request:
    paths:
      - "src/components/xr/**"
      - "src/app/xr/**"
      - "src/components/urai/home/**"
      - "tests/e2e/home-xr-interaction.spec.ts"
      - "src/components/xr/__tests__/**"
      - "scripts/check-webxr-foundation-release-readiness.mjs"
      - "scripts/check-home-xr-deploy-workflow.mjs"
      - "scripts/check-home-xr-launch-evidence-consistency.mjs"
      - ".github/workflows/webxr-foundation-audit.yml"
      - ".github/workflows/deploy-home-xr.yml"

permissions:
  contents: read

concurrency:
  group: legacy-webxr-source-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  GIT_LFS_SKIP_SMUDGE: "1"
  CI: "true"
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "legacy-reference-ci.invalid"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "legacy-reference-ci"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "legacy-reference-ci.invalid"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:legacy-reference"
  FIREBASE_PROJECT_ID: "legacy-reference-ci"
  FIREBASE_CLIENT_EMAIL: "ci@example.invalid"
  FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
  URAI_REQUIRE_FIREBASE_ADMIN: "0"
  URAI_ENABLE_CHRONO_FIRESTORE: "0"
  PLAYWRIGHT_SKIP_BROWSER_GC: "1"

jobs:
  source-audit:
    name: Verify legacy WebXR source without deploy claims
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
          lfs: false

      - name: Prove exact clean head
        shell: bash
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          commit_tree="$(git rev-parse 'HEAD^{tree}')"
          index_tree="$(git write-tree)"
          untracked="$(git ls-files --others --exclude-standard)"
          non_lfs_changes="$(git diff --name-only -- . ':(exclude)public/assets/**')"
          printf 'expected_head=%s\nactual_head=%s\ncommit_tree=%s\nindex_tree=%s\n' \
            "$TARGET_SHA" "$actual_head" "$commit_tree" "$index_tree"
          if [[ -n "$untracked" ]]; then printf 'untracked_paths:\n%s\n' "$untracked"; fi
          if [[ -n "$non_lfs_changes" ]]; then printf 'non_lfs_changes:\n%s\n' "$non_lfs_changes"; fi
          test "$actual_head" = "$TARGET_SHA"
          test "$index_tree" = "$commit_tree"
          test -z "$untracked"
          test -z "$non_lfs_changes"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install frozen dependencies
        run: npm ci

      - name: Verify WebXR release-readiness source contract
        run: node scripts/check-webxr-foundation-release-readiness.mjs

      - name: Verify Home XR deployment quarantine
        run: node scripts/check-home-xr-deploy-workflow.mjs

      - name: Verify Home XR evidence quarantine
        run: node scripts/check-home-xr-launch-evidence-consistency.mjs

      - name: Verify TypeScript and lint
        run: |
          npm run check:types
          npm run lint

      - name: Verify focused XR unit contract
        run: npm test -- --runInBand src/components/xr/__tests__/XRSessionFoundation.test.tsx

      - name: Build source candidate
        run: npm run build

      - name: Verify route asset copy and claim contracts
        run: |
          npm run verify:routes
          npm run verify:assets
          npm run check:public-copy
          npm run check:production-claims

      - name: Verify Home XR lock and historical proof manifest
        run: |
          node scripts/check-home-xr-lock.mjs
          node scripts/check-home-xr-proof-manifest.mjs
          npm run smoke:genesis-spine

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run source-only Home XR browser smoke
        run: npx playwright test tests/e2e/home-xr-interaction.spec.ts --project=chromium --project=mobile-chrome
