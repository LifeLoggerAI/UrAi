name: UrAi CI/CD

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Validate Firebase Secrets
        run: echo "FIREBASE_TOKEN secret is present" && exit 0
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
