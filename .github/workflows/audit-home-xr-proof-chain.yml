name: Audit Home XR Proof Chain

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-home-xr-proof-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-home-xr-proof-chain:
    name: Audit Home XR proof chain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Home XR static lock
        run: node scripts/check-home-xr-lock.mjs

      - name: Check Home XR proof manifest
        run: node scripts/check-home-xr-proof-manifest.mjs

      - name: Check Home XR live deploy proof gate
        run: node scripts/check-home-xr-live-deploy-proof.mjs

      - name: Check Home XR deploy workflow
        run: node scripts/check-home-xr-deploy-workflow.mjs

      - name: Check Home XR evidence index
        run: node scripts/check-home-xr-evidence-index.mjs
