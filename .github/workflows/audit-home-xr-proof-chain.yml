name: Audit Home XR Proof Chain

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-home-xr-proof-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-home-xr-proof-chain:
    name: Audit Home XR proof chain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify legacy production authority boundary
        shell: bash
        run: |
          set -euo pipefail
          test ! -f .github/workflows/deploy.yml
          test ! -f .github/workflows/firebase-hosting-live.yml
          test -f docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md
          grep -Fq 'LifeLoggerAI/urai-spatial' docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md
          grep -Fq 'sole production authority' docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md
          grep -Fq '.github/workflows/spatial-live-deploy.yml' docs/LEGACY_PRODUCTION_DEPLOY_DISABLED.md

      - name: Preserve Home XR source as reference material
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/check-home-xr-lock.mjs
          test -f scripts/check-home-xr-proof-manifest.mjs
          test -f scripts/check-home-xr-live-deploy-proof.mjs
          echo 'Home XR implementation and historical proof remain available for reviewed feature extraction.'
          echo 'Production certification now belongs to LifeLoggerAI/urai-spatial/urai-tier1.'
