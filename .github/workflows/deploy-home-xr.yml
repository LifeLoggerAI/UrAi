name: Legacy Home XR Deploy — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny-legacy-production:
    name: Deny legacy Home XR deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Record canonical authority and fail closed
        shell: bash
        run: |
          cat <<'EOF'
          This workflow is intentionally quarantined.

          LifeLoggerAI/UrAi is a legacy/reference repository. It must not use a
          Firebase CI token, service account, or repository secret to deploy the
          canonical URAI project or any public Home/XR surface.

          Canonical production authority:
            LifeLoggerAI/urai-spatial
            application: urai-tier1
            branch: main
            domain: urai.app

          Use the protected canonical release workflow in urai-spatial.
          No secrets are read and no infrastructure mutation is attempted here.
          EOF
          exit 1
