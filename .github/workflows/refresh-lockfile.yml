name: Refresh package lockfile

on:
  push:
    branches:
      - fix-npm-ci-lockfile
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix-npm-ci-lockfile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Refresh package-lock.json
        run: npm install --package-lock-only

      - name: Restore npm ci in CI workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          text = text.replace('run: npm install\n\n      - name: Check lockfile', 'run: npm ci\n\n      - name: Check lockfile')
          path.write_text(text)
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/refresh-lockfile.yml

      - name: Commit refreshed lockfile and CI change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/ci.yml .github/workflows/refresh-lockfile.yml
          git commit -m "Refresh package lockfile and restore npm ci"
          git push origin fix-npm-ci-lockfile
