name: Legacy Firebase Production Deploy — Quarantined

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny-legacy-production:
    name: Deny legacy production authority
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Record canonical authority and fail closed
        shell: bash
        run: |
          cat <<'EOF'
          This workflow is intentionally quarantined.

          LifeLoggerAI/UrAi is a legacy/reference repository and must not deploy
          Firebase Hosting, Firestore rules, indexes, functions, or any other
          production resource.

          Canonical production authority:
            LifeLoggerAI/urai-spatial
            application: urai-tier1
            branch: main
            domain: urai.app

          Use the protected canonical production workflow in urai-spatial.
          No secrets are read and no infrastructure mutation is attempted here.
          EOF
          exit 1
