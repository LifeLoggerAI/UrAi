name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  app:
    name: App validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Bootstrap launch validation
        run: URAI_SKIP_E2E=1 node scripts/urai-launch-bootstrap.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke

      - name: Upload launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-evidence
          path: artifacts/launch
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            /tmp/urai-playwright-results
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7

  functions:
    name: Firebase Functions validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: npm run build
