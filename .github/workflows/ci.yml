name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  app:
    name: App validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check lockfile
        run: npm run check:lockfile

      - name: Check V1 wiring
        run: npm run check:v1

      - name: Seed demo data
        run: npm run seed:demo

      - name: Unit tests
        run: npm run test:unit

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

  functions:
    name: Firebase Functions validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: npm run build
