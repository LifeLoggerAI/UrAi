name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  app:
    name: App validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate Firebase target
        run: npm run check:firebase

      - name: Check lockfile
        run: npm run check:lockfile

      - name: Check V1 wiring
        run: npm run check:v1

      - name: Check final home lock
        run: npm run check:home

      - name: Check final home ascent
        run: npm run check:ascent

      - name: Check P0 launch gate
        run: npm run launch:p0

      - name: Check P1 release gate
        run: npm run release:p1

      - name: Seed demo data
        run: npm run seed:demo

      - name: Unit tests
        run: npm run test:unit

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

  functions:
    name: Firebase Functions validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: npm run build
