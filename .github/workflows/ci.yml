name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v1-app-green:
    name: V1 app unit/build gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: ci-placeholder-private-key
      URAI_REQUIRE_FIREBASE_ADMIN: "0"
      URAI_ENABLE_CHRONO_FIRESTORE: "0"
      OPENAI_API_KEY: ci-placeholder-openai-key
      PLAYWRIGHT_SKIP_BROWSER_GC: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Unit and rules tests
        run: npm test

      - name: Production build
        run: npm run build

