name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v1-app-green:
    name: V1 app unit/build gate
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      CI: "true"
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
      URAI_REQUIRE_FIREBASE_ADMIN: "0"
      URAI_ENABLE_CHRONO_FIRESTORE: "0"
      OPENAI_API_KEY: ci-placeholder-openai-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Unit and rules tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify routes
        run: npm run verify:routes

      - name: Verify assets
        run: npm run verify:assets

      - name: Verify legacy production authority boundary
        run: node scripts/check-legacy-production-authority-boundary.mjs

      - name: Legacy public-copy audit
        continue-on-error: true
        run: npm run check:public-copy

      - name: Legacy production-claims audit
        continue-on-error: true
        run: npm run check:production-claims

      - name: Legacy XR static and historical proof audit
        continue-on-error: true
        run: |
          node scripts/check-home-xr-lock.mjs
          node scripts/check-home-xr-proof-manifest.mjs
          npm run smoke:life-map-quest
          npm run smoke:life-map-quest-proof

  home-xr-smoke:
    name: Home and Life Map XR Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: v1-app-green

    env:
      CI: "true"
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
      URAI_REQUIRE_FIREBASE_ADMIN: "0"
      URAI_ENABLE_CHRONO_FIRESTORE: "0"
      OPENAI_API_KEY: ci-placeholder-openai-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app for smoke
        run: npm run build

      - name: Run legacy XR browser regressions
        continue-on-error: true
        run: |
          npx playwright test tests/e2e/home-xr-interaction.spec.ts --project=chromium --project=mobile-chrome
          npx playwright test tests/e2e/life-map-quest-interaction.spec.ts --project=chromium --project=mobile-chrome

      - name: Upload Playwright output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xr-playwright-output
          path: /tmp/urai-playwright-results
          if-no-files-found: ignore
