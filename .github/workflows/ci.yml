name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Rules tests
        run: npm run test:rules -- --runInBand

      - name: Unit tests
        run: npm run test:unit -- --runInBand

      - name: Integration tests
        run: npm run test:integration -- --runInBand
