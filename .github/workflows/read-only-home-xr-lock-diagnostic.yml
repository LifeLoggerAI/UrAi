name: Read-only Home XR lock diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/read-only-home-xr-lock-diagnostic.yml
      - scripts/check-home-xr-lock.mjs
      - scripts/check-home-xr-proof-manifest.mjs
      - scripts/smoke-genesis-spine.mjs
      - docs/URAI_LAUNCH_BLOCKER_MATRIX.md

permissions:
  contents: read

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha }}
  GIT_LFS_SKIP_SMUDGE: '1'

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
          lfs: false
      - name: Capture independent lock checks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          mkdir -p receipt
          run_case() {
            name="$1"
            shift
            set +e
            "$@" >"receipt/$name.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" >"receipt/$name.exit"
          }
          run_case home-xr-lock node scripts/check-home-xr-lock.mjs
          run_case proof-manifest node scripts/check-home-xr-proof-manifest.mjs
          run_case genesis-spine npm run smoke:genesis-spine
          printf 'head_sha=%s\ndeployment=false\ncredentialed=false\nproduction_data_mutation=false\n' "$TARGET_SHA" > receipt/authority.env
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-home-xr-lock-${{ env.TARGET_SHA }}
          path: receipt
          if-no-files-found: error
          retention-days: 30
