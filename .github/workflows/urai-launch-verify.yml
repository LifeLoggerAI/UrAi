name: URAI Launch Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  launch-verify:
    name: Typecheck, lint, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Build
        run: npm run build
