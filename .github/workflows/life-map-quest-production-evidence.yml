name: Life Map Quest Production Evidence

on:
  workflow_run:
    workflows: ["Deploy Firebase Production"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  life-map-quest-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      LIFE_MAP_QUEST_LIVE_URL: https://urai-4dc1d.web.app
      PLAYWRIGHT_BASE_URL: https://urai-4dc1d.web.app
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----\n"
      URAI_REQUIRE_FIREBASE_ADMIN: "0"
      URAI_ENABLE_CHRONO_FIRESTORE: "0"
      OPENAI_API_KEY: ci-placeholder-openai-key
      PLAYWRIGHT_SKIP_BROWSER_GC: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify Life Map Quest repo proof gates
        run: |
          npm run smoke:life-map-quest
          npm run smoke:life-map-quest-proof
          npm run smoke:life-map-quest-live-proof

      - name: Verify deployed Life Map routes
        run: |
          set -euo pipefail
          mkdir -p test-results/life-map-quest-production-evidence
          routes=("/" "/home" "/xr" "/life-map")
          : > test-results/life-map-quest-production-evidence/live-route-checks.txt
          for route in "${routes[@]}"; do
            url="${LIFE_MAP_QUEST_LIVE_URL}${route}"
            status=$(curl -L -s -o /tmp/urai-life-map-route-body -w "%{http_code}" "$url")
            echo "$status $url" | tee -a test-results/life-map-quest-production-evidence/live-route-checks.txt
            test "$status" = "200"
          done

      - name: Run deployed Life Map Quest URL smoke
        run: npm run smoke:life-map-quest-live

      - name: Run deployed Life Map Playwright smoke
        run: npx playwright test tests/e2e/life-map-quest-interaction.spec.ts --project=chromium --project=mobile-chrome

      - name: Upload Life Map Quest production evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: life-map-quest-production-evidence
          path: |
            test-results/life-map-quest-production-evidence/
            test-results/life-map-xr-proof/
            playwright-report/
          if-no-files-found: ignore
